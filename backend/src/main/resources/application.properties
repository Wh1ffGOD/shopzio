# Server
server.port=8080

# Active profile: 'dev' for H2, 'prod' for MySQL
spring.profiles.active=dev

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=ecommerce-clone-super-secret-key-change-in-production
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Razorpay (replace with your keys from razorpay.com → Settings → API Keys)
razorpay.key-id=rzp_test_REPLACE_WITH_YOUR_KEY_ID
razorpay.key-secret=REPLACE_WITH_YOUR_KEY_SECRET
